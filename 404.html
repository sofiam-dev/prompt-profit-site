<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Страница не найдена | Prompt Profit Club</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;500;600;700;800;900&family=Onest:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --black: #0a0a0a;
            --white: #fafafa;
            --gray: #888;
            --accent: #FF5C00;
        }

        body {
            font-family: 'Onest', sans-serif;
            background: var(--black);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
            overflow: hidden;
        }

        .bg-text {
            position: fixed;
            font-family: 'Unbounded', cursive;
            font-size: clamp(20rem, 50vw, 40rem);
            font-weight: 900;
            color: rgba(255, 92, 0, 0.05);
            z-index: 0;
            user-select: none;
            line-height: 1;
        }

        .content {
            position: relative;
            z-index: 1;
            max-width: 500px;
        }

        .error-code {
            font-family: 'Unbounded', cursive;
            font-size: clamp(6rem, 20vw, 10rem);
            font-weight: 900;
            color: var(--accent);
            line-height: 1;
            margin-bottom: 24px;
        }

        h1 {
            font-family: 'Unbounded', cursive;
            font-size: clamp(1.5rem, 4vw, 2rem);
            font-weight: 700;
            margin-bottom: 16px;
        }

        p {
            color: var(--gray);
            font-size: 1.1rem;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 16px 32px;
            border-radius: 100px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .btn-primary {
            background: var(--accent);
            color: var(--white);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(255, 92, 0, 0.3);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: var(--white);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--accent);
        }

        .logo {
            position: fixed;
            top: 24px;
            left: 24px;
            font-family: 'Unbounded', cursive;
            font-weight: 800;
            font-size: 1.25rem;
            color: var(--white);
            text-decoration: none;
            z-index: 10;
        }

        .decor {
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 92, 0, 0.2) 0%, transparent 70%);
            filter: blur(60px);
            z-index: 0;
        }

        .decor-1 {
            top: -100px;
            right: -100px;
        }

        .decor-2 {
            bottom: -100px;
            left: -100px;
        }

        @media (max-width: 640px) {
            .btn {
                width: 100%;
                justify-content: center;
                padding: 14px 24px;
            }

            .buttons {
                flex-direction: column;
                width: 100%;
            }

            p {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <a href="/" class="logo">PPC</a>

    <div class="bg-text">404</div>
    <div class="decor decor-1"></div>
    <div class="decor decor-2"></div>

    <div class="content">
        <div class="error-code">404</div>
        <h1>Страница не найдена</h1>
        <p>Похоже, эта страница ушла генерировать контент в нейросетях. Вернитесь на главную или присоединяйтесь к клубу!</p>
        <div class="buttons">
            <a href="/" class="btn btn-primary">
                На главную
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M5 12h14M12 5l7 7-7 7"/>
                </svg>
            </a>
            <a href="https://t.me/PromptProfitClub_bot" class="btn btn-secondary">
                Вступить в клуб
            </a>
        </div>
    </div>
</body>
</html>
